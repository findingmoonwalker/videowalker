<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdPat — LinkedIn Ad Pattern Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ══════════════════════════════════════════════════
   DESIGN SYSTEM
   Fonts:   Inter (body/UI) · Barlow Condensed (display) · Space Mono (meta/mono)
   Scale:   12 · 13 · 15 · 16 · 20 · 24 · 32
   Radius:  4 · 8 · 12 · 16
   Space:   4 · 8 · 12 · 16 · 24 · 32 · 48
   ══════════════════════════════════════════════════ */
:root{
  --bg:#050e1a;
  --surface:#0b1929;
  --surface-2:#0f2038;
  --border:#1a3350;
  --border-2:#0f2238;
  --blue:#0a66c2;
  --blue-hover:#1976d4;
  --blue-3:#4da3ff;
  --gold:#f5a623;
  --green:#43c464;
  --red:#f05252;
  --purple:#b06cde;
  --teal:#00bcd4;
  --t1:#edf4fc;
  --t2:#8db5d6;
  --t3:#4a7096;
  --glass:rgba(11,25,41,0.75);
  --glass-border:rgba(26,51,80,0.8);
  --font:'Inter',sans-serif;
  --font-display:'Barlow Condensed','Inter',sans-serif;
  --font-mono:'Space Mono',monospace;
  /* type scale */
  --text-xs:12px;
  --text-sm:13px;
  --text-base:15px;
  --text-md:16px;
  --text-lg:20px;
  --text-xl:24px;
  --text-2xl:32px;
  /* radius */
  --r-sm:4px;--r-md:8px;--r-lg:12px;--r-xl:16px;
  /* space */
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;--sp-7:48px;
  /* legacy aliases — keep for inline JS compatibility */
  --blue2:var(--blue-hover);
  --blue3:var(--blue-3);
  --gb:var(--glass-border);
  --border2:var(--border-2);
  --surface2:var(--surface-2);
  --font-headline:var(--font-display);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--t1);
  font-family:var(--font);font-size:var(--text-base);
  line-height:1.6;min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.02'/%3E%3C/svg%3E");
}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:orb 24s ease-in-out infinite}
.orb1{width:480px;height:480px;background:radial-gradient(circle,rgba(10,102,194,.12) 0%,transparent 70%);top:-180px;left:-120px}
.orb2{width:360px;height:360px;background:radial-gradient(circle,rgba(0,188,212,.06) 0%,transparent 70%);bottom:60px;right:-80px;animation-delay:-10s}
@keyframes orb{0%,100%{transform:translate(0,0)}40%{transform:translate(20px,-16px)}70%{transform:translate(-12px,10px)}}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--sp-6);height:60px;
  border-bottom:1px solid var(--border);
  background:rgba(5,14,26,.94);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:var(--sp-3)}
.logo-mark{
  width:32px;height:32px;background:var(--blue);border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  font-size:var(--text-xs);font-weight:700;color:#fff;flex-shrink:0;
  box-shadow:0 0 16px rgba(10,102,194,.4);
}
.logo-name{font-family:var(--font-display);font-weight:800;font-size:var(--text-xl);letter-spacing:-.5px;color:var(--t1);line-height:1}
.logo-name span{color:var(--blue-3)}
.logo-tag{font-family:var(--font-mono);font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:var(--sp-3)}
.analyze-new-btn{
  font-family:var(--font);font-weight:600;font-size:var(--text-sm);
  color:var(--blue-3);background:rgba(10,102,194,.1);
  border:1px solid rgba(77,163,255,.25);border-radius:var(--r-md);
  padding:6px 14px;cursor:pointer;transition:all .18s;
  display:none;align-items:center;gap:var(--sp-2);
}
.analyze-new-btn:hover{background:rgba(10,102,194,.2);border-color:rgba(77,163,255,.5)}
.hdr-pill{
  font-family:var(--font-mono);font-size:10px;
  background:rgba(10,102,194,.08);border:1px solid rgba(77,163,255,.18);
  color:var(--blue-3);padding:4px 12px;border-radius:20px;letter-spacing:.5px;
}

/* Landing */
.landing{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 60px);padding:var(--sp-7) var(--sp-5);
}
.landing-inner{width:100%;max-width:520px;display:flex;flex-direction:column;gap:var(--sp-5)}
.land-api{background:rgba(10,102,194,.06);border:1px solid rgba(77,163,255,.15);border-radius:var(--r-lg);padding:var(--sp-4) var(--sp-5)}
.land-api-lbl{font-family:var(--font-mono);font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:var(--sp-2)}
.land-api-input{
  width:100%;background:rgba(5,14,26,.8);border:1px solid var(--border);border-radius:var(--r-md);
  padding:10px 14px;font-family:var(--font-mono);font-size:var(--text-sm);
  color:var(--t1);outline:none;transition:border-color .18s;
}
.land-api-input:focus{border-color:var(--blue-3)}
.land-api-input::placeholder{color:var(--t3)}
.land-api-hint{font-size:var(--text-xs);color:var(--t3);margin-top:var(--sp-2)}
.land-upload{
  border:2px dashed var(--border);border-radius:var(--r-xl);
  padding:var(--sp-7) var(--sp-6);text-align:center;
  cursor:pointer;transition:all .22s;background:rgba(8,18,38,.4);position:relative;
}
.land-upload:hover,.land-upload.drag{border-color:var(--blue-3);background:rgba(10,102,194,.07)}
.land-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.land-upload-icon{font-size:40px;margin-bottom:var(--sp-3);display:block}
.land-upload-title{font-family:var(--font-display);font-weight:800;font-size:var(--text-xl);color:var(--t1);margin-bottom:var(--sp-2)}
.land-upload-sub{font-size:var(--text-sm);color:var(--t2);line-height:1.6;margin-bottom:var(--sp-3)}
.land-upload-tag{display:inline-block;font-family:var(--font-mono);font-size:11px;padding:3px 10px;border-radius:var(--r-sm);border:1px solid var(--border);color:var(--t3)}
.file-loaded{background:rgba(10,102,194,.07);border:1px solid rgba(77,163,255,.2);border-radius:var(--r-lg);padding:var(--sp-4);display:flex;align-items:center;gap:var(--sp-3)}
.file-icon{font-size:20px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:var(--text-sm);font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-family:var(--font-mono);font-size:11px;color:var(--t3);margin-top:3px}
.file-clear{background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;transition:color .18s;flex-shrink:0}
.file-clear:hover{color:var(--red)}
.slide-thumbs-row{display:flex;gap:var(--sp-1);overflow-x:auto;padding:var(--sp-1) 0;scrollbar-width:none;margin-top:var(--sp-2)}
.slide-thumbs-row::-webkit-scrollbar{display:none}
.slide-thumb-mini{flex-shrink:0;width:46px;height:34px;border-radius:var(--r-sm);object-fit:cover;border:1px solid var(--border-2);opacity:.75;transition:opacity .18s}
.slide-thumb-mini:hover{opacity:1}
.go-btn{
  width:100%;padding:14px;background:var(--blue);border:none;
  border-radius:var(--r-lg);font-family:var(--font);font-weight:600;
  font-size:var(--text-base);color:#fff;cursor:pointer;
  position:relative;overflow:hidden;transition:all .22s;
  box-shadow:0 4px 18px rgba(10,102,194,.35);
}
.go-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 50%)}
.go-btn:hover:not(:disabled){background:var(--blue-hover);transform:translateY(-1px);box-shadow:0 8px 24px rgba(10,102,194,.45)}
.go-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* Results */
.results-page{padding:var(--sp-6);overflow-y:auto}
.results{display:flex;flex-direction:column;gap:var(--sp-6)}
.sec-hdr{display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-5)}
.sec-ttl{font-family:var(--font-display);font-size:var(--text-xl);font-weight:700;color:var(--t1);white-space:nowrap}
.sec-badge{font-family:var(--font-mono);font-size:10px;background:rgba(10,102,194,.12);color:var(--blue-3);border:1px solid rgba(77,163,255,.22);padding:3px 10px;border-radius:20px;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}

/* Hero */
.summary-hero{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r-xl);padding:var(--sp-6);backdrop-filter:blur(12px);position:relative;overflow:hidden}
.summary-hero::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at top left,rgba(10,102,194,.08) 0%,transparent 60%)}
.hero-filename{font-family:var(--font-mono);font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:var(--sp-2)}
.hero-title{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;margin-bottom:var(--sp-2);line-height:1.15;color:var(--t1)}
.hero-desc{font-size:var(--text-sm);color:var(--t2);line-height:1.6;max-width:680px}
.hero-stats{display:flex;gap:var(--sp-6);margin-top:var(--sp-5);flex-wrap:wrap}
.hero-stat-val{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;color:var(--blue-3);line-height:1}
.hero-stat-lbl{font-family:var(--font-mono);font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:var(--sp-1)}

/* Ad cards */
.ads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--sp-4)}
.ad-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r-xl);overflow:hidden;transition:all .22s;backdrop-filter:blur(10px)}
.ad-card:hover{border-color:rgba(77,163,255,.35);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.ad-img-wrap{position:relative;background:var(--surface-2);height:120px;overflow:hidden}
.ad-img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;border-bottom:1px solid var(--border-2);transition:transform .3s}
.ad-card:hover .ad-img{transform:scale(1.03)}
.ad-slide-badge{position:absolute;top:8px;left:8px;font-family:var(--font-mono);font-size:9px;background:rgba(5,14,26,.85);color:var(--blue-3);border:1px solid rgba(77,163,255,.25);padding:2px 7px;border-radius:var(--r-sm);backdrop-filter:blur(6px)}
.ad-format-badge{position:absolute;top:8px;right:8px;font-family:var(--font-mono);font-size:9px;padding:2px 7px;border-radius:var(--r-sm);font-weight:700;backdrop-filter:blur(6px)}
.fmt-doc{background:rgba(10,102,194,.22);color:#4da3ff;border:1px solid rgba(77,163,255,.28)}
.fmt-img{background:rgba(67,196,100,.18);color:#43c464;border:1px solid rgba(67,196,100,.28)}
.fmt-vid{background:rgba(240,82,82,.18);color:#f05252;border:1px solid rgba(240,82,82,.28)}
.fmt-car{background:rgba(245,166,35,.18);color:#f5a623;border:1px solid rgba(245,166,35,.28)}
.fmt-tl{background:rgba(176,108,222,.18);color:#c890f0;border:1px solid rgba(176,108,222,.28)}
.ad-body{padding:var(--sp-4)}
.ad-advertiser{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-3)}
.ad-av{width:28px;height:28px;border-radius:var(--r-md);background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:var(--text-xs);font-weight:700;color:#fff;flex-shrink:0}
.ad-adv-name{font-size:var(--text-sm);font-weight:600;color:var(--t1)}

/* DNA */
.dna-section{border-top:1px solid var(--border-2);padding-top:var(--sp-3);margin-top:var(--sp-2);display:flex;flex-direction:column;gap:var(--sp-2)}
.dna-block{background:rgba(8,18,38,.5);border:1px solid var(--border-2);border-radius:var(--r-md);padding:var(--sp-3)}
.dna-block-lbl{font-family:var(--font-mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:var(--sp-2)}
.dna-block-main{font-family:var(--font-display);font-size:var(--text-md);font-weight:700;margin-bottom:var(--sp-1)}
.dna-block-sub{font-size:var(--text-xs);color:var(--t2);line-height:1.55}
.dna-pills{display:flex;flex-wrap:wrap;gap:var(--sp-1)}
.dna-pill{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;font-family:var(--font)}
.group-badge{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.group-proof{background:rgba(245,166,35,.1);color:#f5a623;border:1px solid rgba(245,166,35,.25)}
.group-credibility{background:rgba(77,163,255,.1);color:#4da3ff;border:1px solid rgba(77,163,255,.25)}
.group-insight{background:rgba(176,108,222,.1);color:#c890f0;border:1px solid rgba(176,108,222,.25)}
.group-trust{background:rgba(67,196,100,.1);color:#43c464;border:1px solid rgba(67,196,100,.25)}
.group-relatability{background:rgba(240,82,82,.1);color:#f05252;border:1px solid rgba(240,82,82,.25)}
.angle-tag{font-size:11px;padding:2px 8px;border-radius:var(--r-sm);border:1px solid var(--border);color:var(--t2);background:rgba(10,20,40,.4)}
.tier-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.tier-human{background:rgba(240,82,82,.1);color:#f05252;border:1px solid rgba(240,82,82,.2)}
.tier-thought{background:rgba(245,166,35,.1);color:#f5a623;border:1px solid rgba(245,166,35,.2)}
.tier-evidence{background:rgba(77,163,255,.1);color:#4da3ff;border:1px solid rgba(77,163,255,.2)}

/* Charts */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--sp-4)}
.chart-wrap{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r-lg);padding:var(--sp-5);backdrop-filter:blur(10px)}
.chart-title{font-family:var(--font-mono);font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:var(--sp-4)}

/* Recommendations */
.reco-list{display:flex;flex-direction:column;gap:var(--sp-3)}
.reco-item{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r-lg);padding:var(--sp-4) var(--sp-5);display:flex;gap:var(--sp-3);backdrop-filter:blur(10px)}
.reco-num{width:22px;height:22px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.reco-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;color:var(--t1);margin-bottom:var(--sp-1)}
.reco-desc{font-size:var(--text-sm);color:var(--t2);line-height:1.6}

/* Loading */
.loading{position:fixed;inset:0;z-index:200;background:rgba(5,14,26,.94);backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-3)}
.spin{width:44px;height:44px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-ttl{font-family:var(--font-display);font-size:var(--text-xl);font-weight:700;color:var(--t1)}
.load-st{font-family:var(--font-mono);font-size:11px;color:var(--t3);text-align:center;max-width:280px;line-height:1.5}
.load-bar{width:240px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s ease;box-shadow:0 0 8px rgba(77,163,255,.5)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;z-index:400;background:var(--surface-2);border-radius:var(--r-md);padding:var(--sp-2) var(--sp-4);font-size:var(--text-sm);animation:toastIn .22s ease;pointer-events:none;max-width:300px}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Unused but kept for compatibility */
.insight-strips{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-3)}
.ad-copy{font-size:var(--text-sm);color:var(--t2);line-height:1.6}
.ad-copy.open{-webkit-line-clamp:unset}
.ad-toggle{background:none;border:none;cursor:pointer;font-size:var(--text-xs);color:var(--blue-3);font-family:var(--font-mono)}
.ad-cta{font-size:11px;background:rgba(10,102,194,.12);color:var(--blue-3);border:1px solid rgba(77,163,255,.22);padding:2px 8px;border-radius:20px;font-family:var(--font-mono);display:inline-block}
.ad-doc-title{font-size:var(--text-xs);color:var(--t3);font-family:var(--font-mono);background:rgba(10,20,40,.5);padding:5px 8px;border-radius:var(--r-sm)}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--blue-3)}

@media(max-width:768px){
  header{padding:0 var(--sp-4)}
  .results-page{padding:var(--sp-4)}
  .landing{padding:var(--sp-5) var(--sp-4)}
  .ads-grid,.charts-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">in</div>
      <div>
        <div class="logo-name">Ad<span>Pat</span></div>
        <div class="logo-tag">LinkedIn Ad Pattern Analyzer</div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="analyze-new-btn" id="analyzeNewBtn" onclick="resetToLanding()">↩ Analyze New Set</button>
      <div class="hdr-pill">Powered by Claude Vision</div>
    </div>
  </header>

  <!-- Landing page (shown before analysis) -->
  <div class="landing" id="landingPage">
    <div class="landing-inner">

      <!-- API Key -->
      <div class="land-api">
        <div class="land-api-lbl">Anthropic API Key</div>
        <input type="password" class="land-api-input" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
        <div class="land-api-hint">Session only — never stored or sent anywhere else.</div>
      </div>

      <!-- Upload zone / file loaded state -->
      <div id="uploadArea">
        <div class="land-upload" id="uploadZone">
          <input type="file" id="fileInput" accept=".pptx" onchange="handleFile(event)">
          <span class="land-upload-icon">📊</span>
          <div class="land-upload-title">Drop your PPTX here</div>
          <div class="land-upload-sub">Upload a LinkedIn Ad Library export deck.</div>
          <span class="land-upload-tag">.pptx</span>
        </div>

        <div class="file-loaded" id="fileLoadedSection" style="display:none">
          <div class="file-icon">📋</div>
          <div class="file-info">
            <div class="file-name" id="fileName">—</div>
            <div class="file-meta" id="fileMeta">—</div>
            <div class="slide-thumbs-row" id="slideThumbs"></div>
          </div>
          <button class="file-clear" onclick="clearFile()" title="Remove">✕</button>
        </div>
      </div>

      <!-- Analyze button -->
      <button class="go-btn" id="goBtn" onclick="startAnalysis()" disabled>⚡ Analyze with Vision</button>



    </div>
  </div>

  <!-- Results page (shown after analysis) -->
  <div class="results-page" id="resultsPage" style="display:none">
    <div class="results" id="resultsDiv"></div>
  </div>

</div>

<div class="loading" id="loadingOverlay" style="display:none">

async function processPPTX(file){
  if(!file.name.toLowerCase().endsWith('.pptx')){
    toast('Please upload a .pptx file.');
    return;
  }

  // Show loading state on button immediately
  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Reading file…';

  try {
    const ab = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);

    const slideXmlPaths = Object.keys(zip.files)
      .filter(n => /^ppt\/slides\/slide\d+\.xml$/.test(n))
      .sort((a,b) => parseInt(a.match(/\d+/)[0]) - parseInt(b.match(/\d+/)[0]));

    if(!slideXmlPaths.length){
      toast('No slides found in this PPTX file.');
      btn.textContent = '⚡ Analyze with Vision';
      return;
    }

    const slides = [];
    for(const xmlPath of slideXmlPaths){
      const num = parseInt(xmlPath.match(/\d+/)[0]);
      const relPath = `ppt/slides/_rels/slide${num}.xml.rels`;
      let imagePath = null;
      let mimeType = 'image/png';

      if(zip.files[relPath]){
        const relsXml = await zip.files[relPath].async('string');
        const imgMatch = relsXml.match(/Id="[^"]+"\s+Type="[^"]*\/image"\s+Target="([^"]+)"/);
        if(imgMatch){
          const target = imgMatch[1].replace('../', 'ppt/');
          imagePath = target;
          if(target.toLowerCase().endsWith('.jpg') || target.toLowerCase().endsWith('.jpeg')) mimeType = 'image/jpeg';
          else if(target.toLowerCase().endsWith('.gif')) mimeType = 'image/gif';
        }
      }

      const xml = await zip.files[xmlPath].async('string');
      const meta = extractMeta(xml);

      if(imagePath && zip.files[imagePath]){
        const imgBytes = await zip.files[imagePath].async('uint8array');
        const b64 = uint8ToBase64(imgBytes);
        const dataUrl = `data:${mimeType};base64,${b64}`;
        slides.push({ num, imageB64: b64, mimeType, meta, dataUrl });
      } else {
        slides.push({ num, imageB64: null, mimeType: null, meta, dataUrl: null });
      }
    }

    deck = { fileName: file.name, slides };

    const withImages = slides.filter(s=>s.imageB64).length;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileMeta').textContent = `${slides.length} slides · ${withImages} with images`;

    } else {

    btn.textContent = '⚡ Analyze with Vision';

  }
}

function extractMeta(xml){
  // Extract paragraph text from XML
  const paras = xml.match(/<a:p[\s>][\s\S]*?<\/a:p>/g) || [];
  const lines = [];
  for(const p of paras){
    const ts = (p.match(/<a:t[^>]*>([\s\S]*?)<\/a:t>/g) || [])
      .map(t => t.replace(/<[^>]+>/g,'').trim()).join('').trim();
    if(ts) lines.push(ts);
  }
  return lines.join(' | ');
}

function uint8ToBase64(bytes){
  let binary = '';
  const chunk = 8192;
  for(let i = 0; i < bytes.length; i += chunk){
    binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}

// ── Image crop helper (runs in browser using Canvas) ──────────────────────────
async function cropImageToBase64(imageB64, mimeType, x, y, w, h) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, x, y, w, h, 0, 0, w, h);
      // Return base64 without the data URL prefix
      const dataUrl = canvas.toDataURL('image/png');
      resolve(dataUrl.split(',')[1]);
    };
    img.src = `data:${mimeType};base64,${imageB64}`;
  });
}

async function getImageDimensions(imageB64, mimeType) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
    img.src = `data:${mimeType};base64,${imageB64}`;
  });
}

function getColor(key){ return CHART_COLORS[key] || DEFAULT_COLOR; }

// SVG horizontal bar chart — supports topN and per-bar coloring
// ── Bar chart — fixed labelW, single % signal, visual hierarchy ──────────────
// ═══════════════════════════════════════════════════════════════════════════
//  CHART SYSTEM — inspired by Giorgia Lupi, Nadieh Bremer, Moritz Stefaner
//  Principles: narrative first · minimal ink · expressive not decorative
//  Palette: dark field · muted primaries · gold accent · no chart junk
// ═══════════════════════════════════════════════════════════════════════════

const VIZ = {
  bg:       '#050e1a',
  surface:  '#0b1929',
  line:     'rgba(255,255,255,0.06)',
  tick:     'rgba(255,255,255,0.12)',
  dim:      '#2e4a62',
  muted:    '#4a7096',
  label:    '#8db5d6',
  strong:   '#c8dff0',
  white:    '#edf4fc',
  gold:     '#f5a623',
  mono:     "Space Mono,monospace",
  sans:     "Inter,sans-serif",
  display:  "Barlow Condensed,Inter,sans-serif",
};

// Wrap a chart in the standard card shell
function chartCard(content, opts={}) {
  const span = opts.fullWidth ? 'grid-column:1/-1;' : '';
  const pad  = opts.noPad ? 'padding:0;' : '';
  return (
    '<div style="' + span + 'background:#0b1929;border:1px solid rgba(26,51,80,0.8);' +
    'border-radius:14px;overflow:hidden;' + pad + '">' +
      (opts.title ?
        '<div style="padding:20px 22px 0;font-family:' + VIZ.mono + ';font-size:10px;' +
        'color:' + VIZ.muted + ';letter-spacing:2px;text-transform:uppercase;margin-bottom:18px">' +
        opts.title + '</div>' : '') +
      content +
    '</div>'
  );
}

// ── 1. HOOK TYPE — Radial spoke chart (Lupi-style)
//    Each ad = one dot plotted on the spoke of its hook type.
//    Frequency encoded in spoke length + dot count.
// ─────────────────────────────────────────────────────────────────────────────
function vizHookRadial(freq, total) {
  const entries = Object.entries(freq).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '';
  const n = entries.length;
  const cx=200, cy=200, r=148;
  const spokeGap = 18; // px between dots on a spoke

  let svg = '';

  entries.forEach(([label, val], i) => {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const col = getColor(label);
    const pct = Math.round((val/total)*100);
    const isTop = i === 0;

    // Spoke line — faint
    svg += `<line x1="${cx}" y1="${cy}" x2="${(cx+r*cos).toFixed(1)}" y2="${(cy+r*sin).toFixed(1)}" stroke="${VIZ.dim}" stroke-width="1"/>`;

    // Dots along the spoke — one per ad
    for(let d=0; d<val; d++) {
      const dist = 40 + d * spokeGap;
      const dx = (cx + dist * cos).toFixed(1);
      const dy = (cy + dist * sin).toFixed(1);
      const dotR = isTop ? 5 : 4;
      const op   = isTop ? '1' : '0.6';
      svg += `<circle cx="${dx}" cy="${dy}" r="${dotR}" fill="${col}" opacity="${op}"/>`;
    }

    // Label at spoke tip
    const labelDist = r + 16;
    const lx = (cx + labelDist * cos).toFixed(1);
    const ly = (cy + labelDist * sin).toFixed(1);
    const anchor = cos > 0.1 ? 'start' : cos < -0.1 ? 'end' : 'middle';
    const shortLabel = label.length > 16 ? label.slice(0,14)+'…' : label;
    const pctLabel = isTop ? ` ${pct}%` : ` ${pct}%`;

    svg += `<text x="${lx}" y="${(parseFloat(ly)+4).toFixed(1)}" text-anchor="${anchor}" font-family="${VIZ.mono}" font-size="${isTop?11:10}" fill="${isTop?col:VIZ.muted}" font-weight="${isTop?'700':'400'}">${shortLabel}</text>`;
    svg += `<text x="${lx}" y="${(parseFloat(ly)+16).toFixed(1)}" text-anchor="${anchor}" font-family="${VIZ.mono}" font-size="9" fill="${isTop?VIZ.gold:VIZ.dim}">${pctLabel}</text>`;
  });

  // Center label
  svg += `<text x="${cx}" y="${cy-8}" text-anchor="middle" font-family="${VIZ.display}" font-size="32" font-weight="800" fill="${VIZ.gold}">${total}</text>`;
  svg += `<text x="${cx}" y="${cy+12}" text-anchor="middle" font-family="${VIZ.mono}" font-size="9" fill="${VIZ.muted}" letter-spacing="2">ADS ANALYZED</text>`;

  const inner = '<div style="padding:20px 22px">' +
    '<div style="font-family:' + VIZ.mono + ';font-size:10px;color:' + VIZ.muted + ';letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Hook Type</div>' +
    '<div style="font-size:12px;color:' + VIZ.label + ';margin-bottom:16px">Each dot = one ad · plotted on its hook spoke</div>' +
    '<svg viewBox="0 0 400 400" width="100%" style="max-width:400px;display:block;margin:0 auto">' + svg + '</svg>' +
  '</div>';

  return chartCard(inner, {});
}

// ── 2. CONTENT ANGLE GROUPS — Layered arc chart (Bremer-style)
//    Groups as concentric arcs. Width = share. Colour = group identity.
// ─────────────────────────────────────────────────────────────────────────────
function vizAngleArcs(groupFreq, angleFreq, total) {
  const groups = Object.entries(groupFreq).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!groups.length) return '';

  const totalMentions = groups.reduce((s,[,v])=>s+v,0);
  const cx=220, cy=220, baseR=60, arcSpacing=32;
  const startAngle = -Math.PI * 0.85;
  const endAngle   =  Math.PI * 0.85;
  const sweep = endAngle - startAngle;

  let svg = '';

  // Background arc track for each group
  groups.forEach(([label, val], i) => {
    const R = baseR + i * arcSpacing;
    const col = getColor(label);
    const pct = val / totalMentions;
    const arcEnd = startAngle + sweep * pct;
    const isTop = i === 0;

    // Track
    const tx1 = (cx + R * Math.cos(startAngle)).toFixed(1);
    const ty1 = (cy + R * Math.sin(startAngle)).toFixed(1);
    const tx2 = (cx + R * Math.cos(endAngle)).toFixed(1);
    const ty2 = (cy + R * Math.sin(endAngle)).toFixed(1);
    svg += `<path d="M${tx1},${ty1} A${R},${R} 0 1,1 ${tx2},${ty2}" fill="none" stroke="${VIZ.dim}" stroke-width="${isTop?14:11}" stroke-linecap="round"/>`;

    // Filled arc
    const x2 = (cx + R * Math.cos(arcEnd)).toFixed(1);
    const y2 = (cy + R * Math.sin(arcEnd)).toFixed(1);
    const large = pct > 0.5 ? 1 : 0;
    svg += `<path d="M${tx1},${ty1} A${R},${R} 0 ${large},1 ${x2},${y2}" fill="none" stroke="${col}" stroke-width="${isTop?14:11}" stroke-linecap="round" opacity="${isTop?1:0.72}"/>`;

    // End dot
    svg += `<circle cx="${x2}" cy="${y2}" r="${isTop?7:5}" fill="${col}" opacity="${isTop?1:0.8}"/>`;

    // Label on right side
    const labelR = R;
    const lx = (cx + labelR * Math.cos(arcEnd) + (arcEnd > 0 ? 14 : -14)).toFixed(1);
    const ly = (cy + labelR * Math.sin(arcEnd)).toFixed(1);
    const short = label.length > 12 ? label.slice(0,11)+'…' : label;
    if(pct > 0.08) {
      svg += `<text x="${lx}" y="${(parseFloat(ly)+4).toFixed(1)}" font-family="${VIZ.mono}" font-size="${isTop?11:10}" fill="${isTop?col:VIZ.muted}" font-weight="${isTop?'700':'400'}" text-anchor="${arcEnd>0?'start':'end'}">${short} ${Math.round(pct*100)}%</text>`;
    }
  });

  // Center label
  const topGroup = groups[0];
  const topPct = Math.round((topGroup[1]/totalMentions)*100);
  svg += `<text x="${cx}" y="${cy-12}" text-anchor="middle" font-family="${VIZ.display}" font-size="22" font-weight="800" fill="${VIZ.white}">${topGroup[0]}</text>`;
  svg += `<text x="${cx}" y="${cy+10}" text-anchor="middle" font-family="${VIZ.mono}" font-size="11" fill="${VIZ.gold}">${topPct}% dominant</text>`;
  svg += `<text x="${cx}" y="${cy+26}" text-anchor="middle" font-family="${VIZ.mono}" font-size="9" fill="${VIZ.muted}">content angle group</text>`;

  const inner = '<div style="padding:20px 22px">' +
    '<div style="font-family:' + VIZ.mono + ';font-size:10px;color:' + VIZ.muted + ';letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Content Angle Groups</div>' +
    '<div style="font-size:12px;color:' + VIZ.label + ';margin-bottom:16px">Arc length = share of content angles used</div>' +
    '<svg viewBox="0 0 440 440" width="100%" style="max-width:440px;display:block;margin:0 auto">' + svg + '</svg>' +
  '</div>';

  return chartCard(inner, {});
}

// ── 3. CTA ACTION — Lollipop chart (Stefaner minimalism)
//    Thin stems + weighted dots. Dot size = frequency. Clean baseline.
// ─────────────────────────────────────────────────────────────────────────────
function vizCtaLollipop(freq) {
  const entries = Object.entries(freq).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(!entries.length) return '';
  const total = entries.reduce((s,[,v])=>s+v,0);
  const maxVal = entries[0][1];

  const rowH = 36, padLeft = 170, chartW = 200, dotMaxR = 11;
  const svgH = entries.length * rowH + 16;
  const svgW = padLeft + chartW + dotMaxR * 2 + 40;

  let svg = '';

  // Baseline
  svg += `<line x1="${padLeft}" y1="0" x2="${padLeft}" y2="${svgH}" stroke="${VIZ.dim}" stroke-width="1"/>`;

  entries.forEach(([label, val], i) => {
    const isTop = i === 0;
    const y = i * rowH + rowH / 2 + 8;
    const barLen = Math.round((val / maxVal) * chartW);
    const pct = Math.round((val / total) * 100);
    const dotR = Math.max(4, Math.round((val / maxVal) * dotMaxR));
    const col = getColor(label);
    const short = label.length > 20 ? label.slice(0,18)+'…' : label;

    // Stem
    svg += `<line x1="${padLeft}" y1="${y}" x2="${padLeft+barLen}" y2="${y}" stroke="${col}" stroke-width="${isTop?2:1.5}" opacity="${isTop?1:0.55}"/>`;

    // Dot at end
    svg += `<circle cx="${padLeft+barLen}" cy="${y}" r="${dotR}" fill="${col}" opacity="${isTop?1:0.65}"/>`;

    // Label
    svg += `<text x="${padLeft-10}" y="${y+4}" text-anchor="end" font-family="${VIZ.sans}" font-size="12" fill="${isTop?VIZ.strong:VIZ.muted}" font-weight="${isTop?'600':'400'}">${short}</text>`;

    // Pct label after dot
    svg += `<text x="${padLeft+barLen+dotR+7}" y="${y+4}" font-family="${VIZ.mono}" font-size="10" fill="${isTop?VIZ.gold:VIZ.dim}" font-weight="700">${pct}%</text>`;
  });

  const inner = '<div style="padding:20px 22px">' +
    '<div style="font-family:' + VIZ.mono + ';font-size:10px;color:' + VIZ.muted + ';letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">CTA Action</div>' +
    '<div style="font-size:12px;color:' + VIZ.label + ';margin-bottom:16px">Dot size and length = frequency share</div>' +
    '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" width="100%">' + svg + '</svg>' +
  '</div>';

  return chartCard(inner, {});
}

// ── 4. CONTENT ANGLES TOP 10 — Annotated ranked bars
//    Clean bars, annotated leader, stepped opacity for rank clarity.
// ─────────────────────────────────────────────────────────────────────────────
function vizAngleBars(freq) {
  const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!sorted.length) return '';
  const total = Object.values(freq).reduce((s,v)=>s+v,0);
  const maxV = sorted[0][1];

  const barH=20, gap=9, labelW=210, chartW=170;
  const svgH = sorted.length * (barH+gap) + 4;
  const svgW = labelW + chartW + 55;

  let svg = '';

  sorted.forEach(([label, val], i) => {
    const y = i * (barH + gap);
    const barW = Math.max(2, Math.round((val/maxV)*chartW));
    const pct = Math.round((val/total)*100);
    const col = getColor(label);
    const isTop = i === 0;
    const op = Math.max(0.35, 1 - i * 0.08); // stepped opacity
    const lbl = label.length > 30 ? label.slice(0,28)+'…' : label;

    // Track
    svg += `<rect x="${labelW}" y="${y+4}" width="${chartW}" height="${barH-8}" rx="3" fill="${VIZ.dim}" opacity="0.4"/>`;
    // Fill
    svg += `<rect x="${labelW}" y="${y+4}" width="${barW}" height="${barH-8}" rx="3" fill="${col}" opacity="${op}"/>`;

    // Rank number
    svg += `<text x="10" y="${y+barH*0.7}" font-family="${VIZ.mono}" font-size="9" fill="${VIZ.dim}">0${i+1}</text>`;

    // Label
    svg += `<text x="${labelW-10}" y="${y+barH*0.7}" text-anchor="end" font-family="${VIZ.sans}" font-size="12" fill="${isTop?VIZ.strong:VIZ.muted}" font-weight="${isTop?'600':'400'}">${lbl}</text>`;

    // Pct
    svg += `<text x="${labelW+barW+8}" y="${y+barH*0.7}" font-family="${VIZ.mono}" font-size="10" fill="${isTop?VIZ.gold:VIZ.dim}">${pct}%</text>`;
  });

  const inner = '<div style="padding:20px 22px">' +
    '<div style="font-family:' + VIZ.mono + ';font-size:10px;color:' + VIZ.muted + ';letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Content Angles</div>' +
    '<div style="font-size:12px;color:' + VIZ.label + ';margin-bottom:16px">Top 10 · ranked by frequency · opacity encodes rank</div>' +
    '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" width="100%">' + svg + '</svg>' +
  '</div>';

  return chartCard(inner, {});
}

// ── 5. VISUAL ELEMENTS — Dot-matrix grid (Bremer-inspired data humanism)
//    Each dimension = one row. Dots = strength of winner vs. field.
//    Winner label prominent; runners in ink hierarchy below.
// ─────────────────────────────────────────────────────────────────────────────
function vizVisualDots(rows) {
  const LABELS = {
    '👁 Scroll-Stopper':'Scroll-Stopper','🧍 Human Presence':'Human Presence',
    '🔡 Text on Creative':'Text on Creative','🎨 Colour Temp':'Colour',
    '🧱 Layout':'Layout','🏷 Brand Prominence':'Branding',
    '🔍 Complexity':'Complexity','🖼️ Content Style':'Content Style',
    '📸 Photo Auth':'Authenticity','🎬 Editorial':'Editorial',
    '🔭 Shot Type':'Shot Type','📍 Setting':'Setting','💡 Lighting':'Lighting',
  };

  // Build SVG — one row per dimension
  const rowH = 52, padTop = 8, labelW = 130, dotArea = 280, dotR = 5, dotGap = 14;
  const validRows = rows.filter(([,f])=>f && Object.keys(f).length > 0);
  const svgH = validRows.length * rowH + padTop * 2;
  const svgW = labelW + dotArea + 10;

  let svg = '';

  validRows.forEach(([rawLabel, freq], ri) => {
    const label  = LABELS[rawLabel] || rawLabel.replace(/^[^\w]+/,'').trim();
    const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    const total  = sorted.reduce((s,[,v])=>s+v,0);
    const [topLabel, topVal] = sorted[0];
    const topPct  = Math.round((topVal/total)*100);
    const col     = getColor(topLabel);
    const y0      = padTop + ri * rowH;
    const midY    = y0 + rowH/2;
    const isEven  = ri % 2 === 0;

    // Row background
    if(isEven) svg += `<rect x="0" y="${y0}" width="${svgW}" height="${rowH}" fill="rgba(11,25,41,0.6)" rx="4"/>`;

    // Dimension label
    svg += `<text x="10" y="${midY-6}" font-family="${VIZ.mono}" font-size="9" fill="${VIZ.muted}" text-transform="uppercase" letter-spacing="1">${label.toUpperCase()}</text>`;

    // Winner value
    const topShort = topLabel.length > 18 ? topLabel.slice(0,16)+'…' : topLabel;
    svg += `<text x="10" y="${midY+11}" font-family="${VIZ.display}" font-size="16" font-weight="700" fill="${col}">${topShort}</text>`;

    // Dot row — filled dots = winner share, hollow = remaining
    const totalDots = 10;
    const filledDots = Math.round((topPct/100)*totalDots);
    for(let d=0; d<totalDots; d++) {
      const dx = labelW + d * dotGap + dotR;
      const filled = d < filledDots;
      if(filled) {
        svg += `<circle cx="${dx}" cy="${midY}" r="${dotR}" fill="${col}"/>`;
      } else {
        svg += `<circle cx="${dx}" cy="${midY}" r="${dotR-1}" fill="none" stroke="${VIZ.dim}" stroke-width="1"/>`;
      }
    }

    // Pct label after dots
    const pctX = labelW + totalDots * dotGap + dotR + 10;
    svg += `<text x="${pctX}" y="${midY+4}" font-family="${VIZ.mono}" font-size="11" font-weight="700" fill="${col}">${topPct}%</text>`;

    // Runner up — tiny, below dots
    if(sorted[1]) {
      const r2 = sorted[1];
      const r2pct = Math.round((r2[1]/total)*100);
      const r2short = r2[0].length > 18 ? r2[0].slice(0,16)+'…' : r2[0];
      const r2col = getColor(r2[0]);
      svg += `<text x="${labelW}" y="${y0+rowH-5}" font-family="${VIZ.sans}" font-size="10" fill="${VIZ.dim}">↳ ${r2short} ${r2pct}%</text>`;
    }

    // Divider
    if(ri < validRows.length-1) {
      svg += `<line x1="0" y1="${y0+rowH}" x2="${svgW}" y2="${y0+rowH}" stroke="${VIZ.line}" stroke-width="1"/>`;
    }
  });

  const inner = '<div style="padding:20px 22px">' +
    '<div style="font-family:' + VIZ.mono + ';font-size:10px;color:' + VIZ.muted + ';letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Visual Elements</div>' +
    '<div style="font-size:12px;color:' + VIZ.label + ';margin-bottom:20px">Filled dots = dominant share · 10 dots = 100%</div>' +
    '<div style="overflow-x:auto">' +
      '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" width="100%" style="min-width:360px">' + svg + '</svg>' +
    '</div>' +
  '</div>';

  return chartCard(inner, {fullWidth: true});
}

// ── Keep svgBarChart as fallback for any direct calls ────────────────────────
function svgBarChart(data, title, opts={}){
  let sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  if(opts.topN) sorted = sorted.slice(0, opts.topN);
  if(!sorted.length) return '';
  const total  = Object.values(data).reduce((s,v)=>s+v,0);
  const maxV   = sorted[0][1];
  const barH   = opts.barH || 22;
  const gap    = opts.gap  || 7;
  const labelW = 190;
  const chartW = opts.chartW || 190;
  const svgW   = labelW + chartW + 52;
  const svgH   = sorted.length * (barH + gap) + 4;
  const bars = sorted.map(([label, val], i) => {
    const y = i*(barH+gap), barW = Math.max(2,Math.round((val/maxV)*chartW));
    const pct = Math.round((val/total)*100), col = getColor(label);
    const isTop = i===0, op = isTop?'1':'0.65';
    const lbl = label.length>28?label.slice(0,26)+'…':label;
    return (
      `<text x="${labelW-10}" y="${y+barH*0.68}" text-anchor="end" fill="${isTop?'#c8dff0':'#5a8aaa'}" font-size="12" font-family="Inter,sans-serif" font-weight="${isTop?'600':'400'}">${lbl}</text>` +
      `<rect x="${labelW}" y="${y+4}" width="${chartW}" height="${barH-8}" rx="3" fill="rgba(26,51,80,0.45)"/>` +
      `<rect x="${labelW}" y="${y+4}" width="${barW}" height="${barH-8}" rx="3" fill="${col}" opacity="${op}"/>` +
      `<text x="${labelW+barW+8}" y="${y+barH*0.68}" fill="${col}" opacity="${op}" font-size="11" font-family="Space Mono,monospace" font-weight="700">${pct}%</text>`
    );
  }).join('');
  return '<div class="chart-wrap"><div class="chart-title">'+title+'</div><svg viewBox="0 0 '+svgW+' '+svgH+'" width="100%" style="overflow:visible">'+bars+'</svg></div>';
}

// ── Keep svgDonut as fallback ─────────────────────────────────────────────────
function svgDonut(data, title){
  const entries=Object.entries(data).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '';
  const total=entries.reduce((s,[,v])=>s+v,0);
  const R=68,r=44,cx=88,cy=88;
  let angle=-Math.PI/2;
  const paths=entries.map(([label,val])=>{
    const slice=(val/total)*Math.PI*2,x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    angle+=slice;
    const x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle),large=slice>Math.PI?1:0;
    const xi1=cx+r*Math.cos(angle-slice),yi1=cy+r*Math.sin(angle-slice);
    const xi2=cx+r*Math.cos(angle),yi2=cy+r*Math.sin(angle);
    return `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${r},${r} 0 ${large},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${getColor(label)}" opacity="0.88"/>`;
  }).join('');
  const legend=entries.slice(0,6).map(([label,val],i)=>{
    const pct=Math.round((val/total)*100),col=getColor(label),short=label.length>22?label.slice(0,20)+'…':label,isTop=i===0;
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:3px;height:16px;border-radius:2px;background:'+col+';flex-shrink:0"></div><span style="font-size:12px;color:'+(isTop?'#c8dff0':'#5a8aaa')+';flex:1;font-weight:'+(isTop?'600':'400')+'">'+short+'</span><span style="font-size:11px;font-family:\'Space Mono\',monospace;color:#4a7096;min-width:32px;text-align:right">'+pct+'%</span></div>';
  }).join('');
  const dom=entries[0]?.[0]?.split(' ')[0]||'';
  return '<div class="chart-wrap"><div class="chart-title">'+title+'</div><div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><svg viewBox="0 0 176 176" width="130" style="flex-shrink:0">'+paths+'<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" fill="#edf4fc" font-size="13" font-weight="700" font-family="Inter,sans-serif">'+dom+'</text><text x="'+cx+'" y="'+(cy+14)+'" text-anchor="middle" fill="#4a7096" font-size="9" font-family="Space Mono,monospace">DOMINANT</text></svg><div style="flex:1;min-width:110px">'+legend+'</div></div></div>';
}

// ── buildRecipeCard ──────────────────────────────────────────────────────────
function buildRecipeCard(syn){
  const top1 = (freq) => {
    const e = Object.entries(freq||{}).sort((a,b)=>b[1]-a[1]);
    return e[0] ? { label: e[0][0], count: e[0][1], total: e.reduce((s,[,v])=>s+v,0) } : null;
  };
  const pct = (t) => t ? Math.round((t.count/t.total)*100) : 0;
  const n = syn.narrative||{};
  const CARD_BG = ['#1A2B3D', '#2E5FA3', '#5B90CF', '#8AB4E0'];
  const dims = [
    { label:'HOOK TYPE',     val: top1(syn.hookFreq),       insight: n.hook_insight||''   },
    { label:'CONTENT ANGLE', val: top1(syn.groupFreq),      insight: n.angle_insight||''  },
    { label:'VISUAL',        val: top1(syn.scrollStopFreq), insight: n.visual_insight||'' },
    { label:'CTA',           val: top1(syn.ctaFreq),        insight: n.cta_insight||''    },
  ].filter(d => d.val);
  if(!dims.length) return '';
  const cards = dims.map((d, i) => {
    const bg=CARD_BG[i]||CARD_BG[CARD_BG.length-1], p=pct(d.val);
    const short=d.val.label.length>16?d.val.label.slice(0,15)+'…':d.val.label;
    const isDark=i<2;
    const labelCol=isDark?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.75)';
    const textCol=isDark?'rgba(255,255,255,0.88)':'#ffffff';
    const trackCol=isDark?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.25)';
    const divCol=isDark?'rgba(255,255,255,0.10)':'rgba(255,255,255,0.18)';
    return (
      '<div style="flex:1;min-width:200px;background:'+bg+';border-radius:16px;padding:22px 20px 20px;display:flex;flex-direction:column;gap:0">'+
        '<div style="font-family:\'Space Mono\',monospace;font-size:11px;font-weight:700;color:'+labelCol+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">'+d.label+'</div>'+
        '<div style="font-family:var(--font-display);font-size:36px;font-weight:800;color:#f5a623;line-height:1.0;margin-bottom:14px;letter-spacing:-0.5px">'+short+'</div>'+
        '<div style="height:5px;background:'+trackCol+';border-radius:3px;overflow:hidden;margin-bottom:9px">'+
          '<div style="height:100%;width:'+p+'%;background:#f5a623;border-radius:3px"></div>'+
        '</div>'+
        '<div style="font-family:\'Space Mono\',monospace;font-size:12px;font-weight:700;color:#f5a623;margin-bottom:18px">'+p+'% of ads</div>'+
        '<div style="height:1px;background:'+divCol+';margin-bottom:16px"></div>'+
        '<div style="font-family:\'Inter\',sans-serif;font-size:11px;font-weight:400;color:'+textCol+';line-height:1.6;flex:1">'+(d.insight||'—')+'</div>'+
      '</div>'
    );
  }).join('');
  return (
    '<div style="margin-bottom:28px">'+
      '<div style="font-family:\'Space Mono\',monospace;font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">The Winning Recipe — dominant pattern across all ads</div>'+
      '<div style="display:flex;gap:14px;align-items:stretch;flex-wrap:wrap">'+cards+'</div>'+
    '</div>'
  );
}

          ${ad.linkedin_url?`<a href="${ad.linkedin_url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'Space Mono',monospace;color:var(--blue3);text-decoration:none;padding:4px 10px;border:1px solid rgba(77,163,255,.22);border-radius:6px;background:rgba(10,102,194,.07)">↗ View on LinkedIn</a>`:''}
        </div>

      </div>
    </div>`;
  return el;
}

function toggleCopy(i){
  const el=document.getElementById(`copy-${i}`),btn=el?.nextElementSibling;
  if(!el)return;
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'Show less ↑':'Show more ↓';
}

function buildSynthesis(syn, isMixed, formats){ return document.createElement('div'); }


// ── Helpers ───────────────────────────────────────────────────────────────────
function delay(ms){ return new Promise(r => setTimeout(r, ms)); }
function toast(msg, type='error'){
  document.querySelector('.toast')?.remove();
  const t = document.createElement('div'); t.className='toast';
  t.style.cssText = `border:1px solid ${type==='ok'?'#4caf50':'#f44336'};color:${type==='ok'?'#4caf50':'#f44336'}`;
  t.textContent = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 4500);
}
</script>
