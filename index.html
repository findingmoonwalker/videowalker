<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdPat — LinkedIn Ad Pattern Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#020b18;--surface:#0a1628;--surface2:#0d2040;--surface3:#142850;
  --border:#1e3d5c;--border2:#152a44;
  --blue:#0a66c2;--blue2:#1976d4;--blue3:#4da3ff;
  --gold:#f5a623;--teal:#00bcd4;--green:#43c464;--purple:#b06cde;--red:#f05252;
  --t1:#f0f7ff;--t2:#93bfe0;--t3:#4e7a9e;
  --glass:rgba(10,28,52,0.7);--gb:rgba(20,50,85,0.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:orb 22s ease-in-out infinite}
.orb1{width:520px;height:520px;background:radial-gradient(circle,rgba(10,102,194,.14) 0%,transparent 70%);top:-200px;left:-140px}
.orb2{width:380px;height:380px;background:radial-gradient(circle,rgba(0,188,212,.07) 0%,transparent 70%);bottom:80px;right:-80px;animation-delay:-9s}
@keyframes orb{0%,100%{transform:translate(0,0)}40%{transform:translate(25px,-18px)}70%{transform:translate(-15px,12px)}}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 36px;border-bottom:1px solid var(--border);background:rgba(2,11,24,.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;box-shadow:0 0 18px rgba(10,102,194,.5)}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--t1)}
.logo-name span{color:var(--blue3)}
.logo-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px}
.analyze-new-btn{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--blue3);background:rgba(10,102,194,.12);border:1px solid rgba(10,102,194,.3);border-radius:8px;padding:7px 16px;cursor:pointer;transition:all .2s;display:none;align-items:center;gap:6px}
.analyze-new-btn:hover{background:rgba(10,102,194,.22);border-color:var(--blue)}
.hdr-pill{font-family:'Space Mono',monospace;font-size:9px;background:rgba(10,102,194,.1);border:1px solid rgba(10,102,194,.25);color:var(--blue3);padding:5px 12px;border-radius:20px;letter-spacing:.8px}

/* ── Landing page layout — single centered column ── */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 63px);padding:48px 24px;gap:0}
.landing-inner{width:100%;max-width:560px;display:flex;flex-direction:column;gap:32px}

/* Landing API key */
.land-api{background:rgba(10,102,194,.07);border:1px solid rgba(10,102,194,.2);border-radius:12px;padding:18px 20px}
.land-api-lbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.land-api-input{width:100%;background:rgba(6,18,38,.9);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:'Space Mono',monospace;font-size:13px;color:var(--t1);outline:none;transition:border-color .2s}
.land-api-input:focus{border-color:var(--blue)}
.land-api-input::placeholder{color:var(--t3)}
.land-api-hint{font-size:12px;color:var(--t3);margin-top:7px}

/* Landing upload zone */
.land-upload{border:2px dashed var(--border);border-radius:14px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(8,18,38,.5);position:relative}
.land-upload:hover,.land-upload.drag{border-color:var(--blue);background:rgba(10,102,194,.08);transform:scale(1.01)}
.land-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.land-upload-icon{font-size:44px;margin-bottom:14px;display:block}
.land-upload-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--t1);margin-bottom:8px}
.land-upload-sub{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:14px}
.land-upload-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:11px;padding:4px 12px;border-radius:5px;border:1px solid var(--border);color:var(--t3);background:rgba(10,20,40,.6)}

/* Landing how-it-works */
.land-how{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.land-step{background:rgba(10,18,40,.6);border:1px solid var(--border);border-radius:10px;padding:16px}
.land-step-n{font-family:'Space Mono',monospace;font-size:11px;color:var(--blue3);font-weight:700;margin-bottom:7px}
.land-step-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--t1);margin-bottom:5px}
.land-step-b{font-size:12px;color:var(--t3);line-height:1.5}

/* File loaded state (replaces upload zone after file picked) */
.file-loaded{background:rgba(10,102,194,.08);border:1px solid rgba(10,102,194,.28);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:12px}
.file-icon{font-size:22px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-family:'Space Mono',monospace;font-size:11px;color:var(--t3);margin-top:3px}
.file-clear{background:none;border:none;cursor:pointer;color:var(--t3);font-size:18px;transition:color .2s;flex-shrink:0}
.file-clear:hover{color:var(--red)}

/* Slide thumbs — small row below file info */
.slide-thumbs-row{display:flex;gap:6px;overflow-x:auto;padding:4px 0;scrollbar-width:none;margin-top:2px}
.slide-thumbs-row::-webkit-scrollbar{display:none}
.slide-thumb-mini{flex-shrink:0;width:48px;height:36px;border-radius:4px;object-fit:cover;border:1px solid var(--border2);opacity:.8;transition:opacity .2s}
.slide-thumb-mini:hover{opacity:1}

/* Analyze button */
.go-btn{width:100%;padding:15px;background:var(--blue);border:none;border-radius:11px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff;cursor:pointer;position:relative;overflow:hidden;transition:all .28s;box-shadow:0 4px 20px rgba(10,102,194,.4)}
.go-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 50%)}
.go-btn:hover:not(:disabled){background:var(--blue2);transform:translateY(-1px);box-shadow:0 8px 28px rgba(10,102,194,.5)}
.go-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ── Results page layout ── */
.results-page{padding:32px 36px;overflow-y:auto}
.results{display:flex;flex-direction:column;gap:32px}
.sec-hdr{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.sec-ttl{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--t1)}
.sec-badge{font-family:'Space Mono',monospace;font-size:10px;background:rgba(10,102,194,.15);color:var(--blue3);border:1px solid rgba(10,102,194,.3);padding:3px 10px;border-radius:20px}
.sec-line{flex:1;height:1px;background:var(--border)}

/* Summary hero */
.summary-hero{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:26px 28px;backdrop-filter:blur(10px);position:relative;overflow:hidden}
.summary-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(10,102,194,.1) 0%,transparent 60%);pointer-events:none}
.hero-filename{font-family:'Space Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.hero-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:7px;line-height:1.2;color:var(--t1)}
.hero-desc{font-size:14px;color:var(--t2);line-height:1.7;max-width:720px}
.hero-stats{display:flex;gap:28px;margin-top:20px;flex-wrap:wrap}
.hero-stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--blue3)}
.hero-stat-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Ad cards grid */
.ads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
.ad-card{background:var(--glass);border:1px solid var(--gb);border-radius:14px;overflow:hidden;transition:all .28s;backdrop-filter:blur(10px)}
.ad-card:hover{border-color:rgba(10,102,194,.5);transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,.35)}

/* Ad image — SMALLER thumbnail strip */
.ad-img-wrap{position:relative;background:var(--surface2);height:120px;overflow:hidden}
.ad-img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;border-bottom:1px solid var(--border2);transition:transform .3s}
.ad-card:hover .ad-img{transform:scale(1.03)}
.ad-slide-badge{position:absolute;top:8px;left:8px;font-family:'Space Mono',monospace;font-size:9px;background:rgba(2,11,24,.85);color:var(--blue3);border:1px solid rgba(77,163,255,.3);padding:2px 8px;border-radius:4px;backdrop-filter:blur(6px)}
.ad-format-badge{position:absolute;top:8px;right:8px;font-family:'Space Mono',monospace;font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;backdrop-filter:blur(6px)}
.fmt-doc{background:rgba(10,102,194,.25);color:#4da3ff;border:1px solid rgba(77,163,255,.3)}
.fmt-img{background:rgba(67,196,100,.2);color:#43c464;border:1px solid rgba(67,196,100,.3)}
.fmt-vid{background:rgba(240,82,82,.2);color:#f05252;border:1px solid rgba(240,82,82,.3)}
.fmt-car{background:rgba(245,166,35,.2);color:#f5a623;border:1px solid rgba(245,166,35,.3)}
.fmt-tl{background:rgba(176,108,222,.2);color:#c890f0;border:1px solid rgba(176,108,222,.3)}

.ad-body{padding:16px}
.ad-advertiser{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.ad-av{width:30px;height:30px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.ad-adv-name{font-size:13px;font-weight:700;color:var(--t1)}
.ad-headline{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--t1);margin-bottom:7px;line-height:1.3}
.ad-copy{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ad-copy.open{-webkit-line-clamp:unset}
.ad-toggle{background:none;border:none;cursor:pointer;font-size:11px;color:var(--blue3);font-family:'Space Mono',monospace;padding:1px 0;display:block;transition:color .18s;margin-bottom:10px}
.ad-toggle:hover{color:var(--t1)}
.ad-cta{font-size:11px;background:rgba(10,102,194,.15);color:var(--blue3);border:1px solid rgba(77,163,255,.25);padding:3px 10px;border-radius:20px;font-family:'Space Mono',monospace;display:inline-block;margin-bottom:12px}
.ad-doc-title{font-size:11px;color:var(--t3);font-family:'Space Mono',monospace;background:rgba(10,20,40,.6);padding:6px 9px;border-radius:5px;margin-bottom:11px;line-height:1.4}

/* DNA section */
.dna-section{border-top:1px solid var(--border2);padding-top:13px;margin-top:4px;display:flex;flex-direction:column;gap:10px}
.dna-block{background:rgba(8,18,40,.5);border:1px solid var(--border2);border-radius:8px;padding:12px 13px}
.dna-block-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.dna-block-main{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px}
.dna-block-sub{font-size:12px;color:var(--t2);line-height:1.5}
.dna-pills{display:flex;flex-wrap:wrap;gap:5px}
.dna-pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid;font-family:'DM Sans',sans-serif}

/* Content angle group badges */
.group-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Space Mono',monospace;font-size:9px;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.group-proof{background:rgba(245,166,35,.12);color:#f5a623;border:1px solid rgba(245,166,35,.3)}
.group-credibility{background:rgba(77,163,255,.12);color:#4da3ff;border:1px solid rgba(77,163,255,.3)}
.group-insight{background:rgba(176,108,222,.12);color:#c890f0;border:1px solid rgba(176,108,222,.3)}
.group-trust{background:rgba(67,196,100,.12);color:#43c464;border:1px solid rgba(67,196,100,.3)}
.group-relatability{background:rgba(240,82,82,.12);color:#f05252;border:1px solid rgba(240,82,82,.3)}

/* Pattern tier badge */
.tier-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;font-family:'Syne',sans-serif}
.tier-human{background:rgba(240,82,82,.1);color:#f05252;border:1px solid rgba(240,82,82,.25)}
.tier-thought{background:rgba(245,166,35,.1);color:#f5a623;border:1px solid rgba(245,166,35,.25)}
.tier-evidence{background:rgba(77,163,255,.1);color:#4da3ff;border:1px solid rgba(77,163,255,.25)}

/* Angle tags */
.angle-tag{font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);color:var(--t2);background:rgba(10,20,40,.5)}

/* Charts grid */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.chart-wrap{background:var(--glass);border:1px solid var(--gb);border-radius:13px;padding:20px;backdrop-filter:blur(10px)}
.chart-title{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}

/* Key takeaway */
.takeaway-banner{background:linear-gradient(135deg,rgba(10,102,194,.14),rgba(176,108,222,.09));border:1px solid rgba(77,163,255,.25);border-radius:12px;padding:18px 22px;margin-bottom:24px;display:flex;gap:14px;align-items:flex-start}
.takeaway-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.takeaway-lbl{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--blue3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.takeaway-text{font-size:14px;color:var(--t1);line-height:1.65}

/* Insight strips grid */
.insight-strips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.insight-strip{background:rgba(10,18,40,.6);border:1px solid var(--border);border-radius:9px;padding:13px 15px;display:flex;gap:11px;align-items:flex-start}
.insight-strip-icon{font-size:18px;flex-shrink:0}
.insight-strip-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.insight-strip-text{font-size:12px;color:var(--t2);line-height:1.55}

/* Reco items */
.reco-list{display:flex;flex-direction:column;gap:10px}
.reco-item{background:rgba(10,18,40,.6);border:1px solid var(--border);border-radius:10px;padding:15px 16px;display:flex;gap:13px}
.reco-num{width:24px;height:24px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.reco-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px}
.reco-desc{font-size:13px;color:var(--t2);line-height:1.55}

/* Loading */
.loading{position:fixed;inset:0;z-index:200;background:rgba(2,11,24,.93);backdrop-filter:blur(14px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spin{width:50px;height:50px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-ttl{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;color:var(--t1)}
.load-st{font-family:'Space Mono',monospace;font-size:11px;color:var(--t3);text-align:center;max-width:320px;line-height:1.5}
.load-bar{width:260px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s ease;box-shadow:0 0 10px rgba(77,163,255,.6)}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;z-index:400;background:var(--surface2);border-radius:9px;padding:10px 16px;font-size:12px;animation:toastIn .28s ease;max-width:320px;pointer-events:none}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--blue)}

@media(max-width:760px){
  .results-page{padding:20px 16px}
  .landing{padding:28px 16px}
  .landing-inner{max-width:100%}
  .land-how{grid-template-columns:1fr}
  .insight-strips{grid-template-columns:1fr}
  .ads-grid{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">in</div>
      <div>
        <div class="logo-name">Ad<span>Pat</span></div>
        <div class="logo-tag">LinkedIn Ad Pattern Analyzer</div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="analyze-new-btn" id="analyzeNewBtn" onclick="resetToLanding()">↩ Analyze New Set</button>
      <div class="hdr-pill">Powered by Claude Vision</div>
    </div>
  </header>

  <!-- Landing page (shown before analysis) -->
  <div class="landing" id="landingPage">
    <div class="landing-inner">

      <!-- API Key -->
      <div class="land-api">
        <div class="land-api-lbl">Anthropic API Key</div>
        <input type="password" class="land-api-input" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
        <div class="land-api-hint">Session only — never stored or sent anywhere else.</div>
      </div>

      <!-- Upload zone / file loaded state -->
      <div id="uploadArea">
        <div class="land-upload" id="uploadZone">
          <input type="file" id="fileInput" accept=".pptx" onchange="handleFile(event)">
          <span class="land-upload-icon">📊</span>
          <div class="land-upload-title">Drop your PPTX here</div>
          <div class="land-upload-sub">Upload a LinkedIn Ad Library export deck.</div>
          <span class="land-upload-tag">.pptx</span>
        </div>

        <div class="file-loaded" id="fileLoadedSection" style="display:none">
          <div class="file-icon">📋</div>
          <div class="file-info">
            <div class="file-name" id="fileName">—</div>
            <div class="file-meta" id="fileMeta">—</div>
            <div class="slide-thumbs-row" id="slideThumbs"></div>
          </div>
          <button class="file-clear" onclick="clearFile()" title="Remove">✕</button>
        </div>
      </div>

      <!-- Analyze button -->
      <button class="go-btn" id="goBtn" onclick="startAnalysis()" disabled>⚡ Analyze with Vision</button>



    </div>
  </div>

  <!-- Results page (shown after analysis) -->
  <div class="results-page" id="resultsPage" style="display:none">
    <div class="results" id="resultsDiv"></div>
  </div>

</div>

<div class="loading" id="loadingOverlay" style="display:none">
  <div class="spin"></div>
  <div class="load-ttl">Analyzing with Vision…</div>
  <div class="load-st" id="loadStatus">Extracting slide images</div>
  <div class="load-bar"><div class="load-fill" id="loadFill" style="width:0%"></div></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let deck = null; // { fileName, slides: [{num, imageB64, mimeType, meta, dataUrl}] }

// ── PPTX parsing ──────────────────────────────────────────────────────────────
function handleFile(e){ const f = e.target.files[0]; if(f) processPPTX(f); e.target.value=''; }

async function processPPTX(file){
  if(!file.name.toLowerCase().endsWith('.pptx')){
    toast('Please upload a .pptx file.');
    return;
  }

  // Show loading state on button immediately
  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Reading file…';

  try {
    const ab = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);

    const slideXmlPaths = Object.keys(zip.files)
      .filter(n => /^ppt\/slides\/slide\d+\.xml$/.test(n))
      .sort((a,b) => parseInt(a.match(/\d+/)[0]) - parseInt(b.match(/\d+/)[0]));

    if(!slideXmlPaths.length){
      toast('No slides found in this PPTX file.');
      btn.textContent = '⚡ Analyze with Vision';
      return;
    }

    const slides = [];
    for(const xmlPath of slideXmlPaths){
      const num = parseInt(xmlPath.match(/\d+/)[0]);
      const relPath = `ppt/slides/_rels/slide${num}.xml.rels`;
      let imagePath = null;
      let mimeType = 'image/png';

      if(zip.files[relPath]){
        const relsXml = await zip.files[relPath].async('string');
        const imgMatch = relsXml.match(/Id="[^"]+"\s+Type="[^"]*\/image"\s+Target="([^"]+)"/);
        if(imgMatch){
          const target = imgMatch[1].replace('../', 'ppt/');
          imagePath = target;
          if(target.toLowerCase().endsWith('.jpg') || target.toLowerCase().endsWith('.jpeg')) mimeType = 'image/jpeg';
          else if(target.toLowerCase().endsWith('.gif')) mimeType = 'image/gif';
        }
      }

      const xml = await zip.files[xmlPath].async('string');
      const meta = extractMeta(xml);

      if(imagePath && zip.files[imagePath]){
        const imgBytes = await zip.files[imagePath].async('uint8array');
        const b64 = uint8ToBase64(imgBytes);
        const dataUrl = `data:${mimeType};base64,${b64}`;
        slides.push({ num, imageB64: b64, mimeType, meta, dataUrl });
      } else {
        slides.push({ num, imageB64: null, mimeType: null, meta, dataUrl: null });
      }
    }

    deck = { fileName: file.name, slides };

    const withImages = slides.filter(s=>s.imageB64).length;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileMeta').textContent = `${slides.length} slides · ${withImages} with images`;
    document.getElementById('fileLoadedSection').style.display = 'flex';
    document.getElementById('uploadZone').style.display = 'none';
    renderThumbnails();

    // Enable button only if we have image slides to analyze
    if(withImages > 0){
      btn.disabled = false;
      btn.textContent = `⚡ Analyze ${withImages} Ad${withImages!==1?'s':''}`;
      toast(`✓ Loaded ${withImages} ad slide${withImages!==1?'s':''}`, 'ok');
    } else {
      btn.textContent = '⚡ Analyze with Vision';
      toast('No image slides found — this PPTX may not contain ad screenshots.');
    }

  } catch(err){
    console.error(err);
    btn.disabled = false;
    btn.textContent = '⚡ Analyze with Vision';
    toast('Could not read PPTX: ' + err.message);
  }
}

function extractMeta(xml){
  // Extract paragraph text from XML
  const paras = xml.match(/<a:p[\s>][\s\S]*?<\/a:p>/g) || [];
  const lines = [];
  for(const p of paras){
    const ts = (p.match(/<a:t[^>]*>([\s\S]*?)<\/a:t>/g) || [])
      .map(t => t.replace(/<[^>]+>/g,'').trim()).join('').trim();
    if(ts) lines.push(ts);
  }
  return lines.join(' | ');
}

function uint8ToBase64(bytes){
  let binary = '';
  const chunk = 8192;
  for(let i = 0; i < bytes.length; i += chunk){
    binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}

function renderThumbnails(){
  const thumbsRow = document.getElementById('slideThumbs');
  // Small thumbnails in a horizontal row
  thumbsRow.innerHTML = deck.slides

    .join('');
}

async function startAnalysis(){
  const apiKey = document.getElementById('apiKey').value.trim();
  if(!apiKey){ toast('Enter your Anthropic API key first.'); return; }
  if(!deck){ toast('Upload a PPTX file first.'); return; }

  const ov = document.getElementById('loadingOverlay');
  const st = document.getElementById('loadStatus');
  const fill = document.getElementById('loadFill');
  const btn = document.getElementById('goBtn');
  ov.style.display = 'flex';
  btn.disabled = true;
  const setP = (p, m) => { fill.style.width = p + '%'; st.textContent = m; };

  try {
    const imageSlides = deck.slides.filter(s => s.imageB64);
    if(!imageSlides.length){ toast('No image slides to analyze.'); ov.style.display='none'; btn.disabled=false; return; }

    const analyses = [];
    for(let i = 0; i < imageSlides.length; i++){
      const s = imageSlides[i];
      setP(8 + Math.round((i / imageSlides.length) * 62), `Reading slide ${i+1} of ${imageSlides.length} with Vision…`);
      const result = await analyzeSlideImage(s, apiKey);
      analyses.push({ ...result, num: s.num, dataUrl: s.dataUrl });
      await delay(300);
    }

    setP(75, 'Synthesizing patterns across all ads…');
    await delay(300);
    const synthesis = await synthesizeAll(analyses, apiKey);

    setP(92, 'Building report…');
    await delay(200);
    renderResults(analyses, synthesis);
    setP(100, 'Done!');
    await delay(400);

  } catch(err){
    console.error(err);
    toast('Error: ' + (err.message || 'Unknown — check your API key and try again.'));
  } finally {
    ov.style.display = 'none';
    btn.disabled = false;
  }
}

  { badge: '🫀 Human Moment',       cls: 'tier-human',    trigger: 'Relatability + Proof or Insight',      meaning: 'Vulnerability made credible' },
  { badge: '💡 Thought Leadership', cls: 'tier-thought',  trigger: 'Insight + Credibility or Proof',       meaning: 'Authority with original thinking' },

function detectTier(groups) {
  const g = groups || [];
  const has = x => g.includes(x);
  if(has('Relatability') && (has('Proof') || has('Insight'))) return PATTERN_TIERS[0];
  if(has('Insight') && (has('Credibility') || has('Proof')))  return PATTERN_TIERS[1];
  if(has('Proof') && has('Credibility') && !has('Relatability')) return PATTERN_TIERS[2];
  return null;
}

function buildFrameworkPrompt() {
  const hookList = HOOK_TYPES.map(h =>
    `  ${h.id}. ${h.name} — ${h.desc}\n     Example: ${h.example}`
  ).join('\n');

  const angleList = Object.entries(CONTENT_ANGLES).map(([group, angles]) => {
    const startNum = Object.entries(CONTENT_ANGLES)
      .slice(0, Object.keys(CONTENT_ANGLES).indexOf(group))
      .reduce((sum, [,a]) => sum + a.length, 1);
    return `  ${group}:\n` +
      angles.map((a, i) => `    ${startNum + i}. ${a}`).join('\n');
  }).join('\n');

  const styleList = CONTENT_STYLES.map(s =>
    `  ${s.id}. ${s.name} — ${s.desc}\n     e.g. ${s.examples}`
  ).join('\n');

  return `HOOK TYPES — pick exactly ONE (1–6):
${hookList}

CONTENT ANGLES — 30 across 5 groups, pick ALL that apply:
${angleList}

CONTENT STYLE — pick exactly ONE (1–10) based on what the visual/creative looks like:
${styleList}`;
}

// ── Image crop helper (runs in browser using Canvas) ──────────────────────────
async function cropImageToBase64(imageB64, mimeType, x, y, w, h) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, x, y, w, h, 0, 0, w, h);
      // Return base64 without the data URL prefix
      const dataUrl = canvas.toDataURL('image/png');
      resolve(dataUrl.split(',')[1]);
    };
    img.src = `data:${mimeType};base64,${imageB64}`;
  });
}

async function getImageDimensions(imageB64, mimeType) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
    img.src = `data:${mimeType};base64,${imageB64}`;
  });
}

async function synthesizeAll(analyses, apiKey){
  // Build frequency maps client-side (no Claude needed for charts)
  const freq = (arr, key) => arr.reduce((acc,a)=>{const v=a[key]||'Unknown';acc[v]=(acc[v]||0)+1;return acc;},{});
  const hookFreq      = freq(analyses,'hook_type_name');
  const styleFreq     = freq(analyses,'content_style_name');
  const moodFreq      = freq(analyses,'visual_mood');
  const ctaFreq       = freq(analyses,'cta_action_type');
  const ctaFricFreq   = freq(analyses,'cta_friction');
  const toneFreq      = freq(analyses,'tone');
  const objFreq       = freq(analyses,'objective');
  const faceCount     = analyses.filter(a=>a.has_human_face).length;

  const groupFreq = {};
  analyses.forEach(a=>(a.content_angle_groups||[]).forEach(g=>{groupFreq[g]=(groupFreq[g]||0)+1;}));

  const angleFreq = {};
  analyses.forEach(a=>(a.content_angles||[]).forEach(a2=>{angleFreq[a2]=(angleFreq[a2]||0)+1;}));

  const tierFreq = {};
  analyses.forEach(a=>{const t=a.pattern_tier?.badge||'None';tierFreq[t]=(tierFreq[t]||0)+1;});

  // Ask Claude for the narrative summary only
  const adSummaries = analyses.map((a,i)=>
    `Ad${i+1}: hook="${a.hook_type_name}" style="${a.content_style_name}" cta="${a.cta_action_type}" groups=${(a.content_angle_groups||[]).join('+')} tone="${a.tone}"`
  ).join('\n');

  const prompt = `You are a senior LinkedIn advertising strategist writing a pattern intelligence brief — not a copywriter, not a data analyst. Write with strategic clarity: direct, opinionated, and specific. No filler phrases like "it's worth noting" or "this suggests". Say what you see.

These are ${analyses.length} top-performing LinkedIn ads. Synthesize the pattern:

${adSummaries}

Return ONLY raw JSON:
{
  "headline": "6-word sharp strategic summary of what makes these ads win",
  "pattern_insight": "2-3 sentences written like a strategist — what is the dominant creative pattern and why it works. Be specific.",
  "hook_insight": "1 sharp sentence on the hook pattern — what type dominates and why it works for this audience",
  "visual_insight": "1 sharp sentence on the content style pattern — what visual treatment wins and what it signals",
  "cta_insight": "1 sharp sentence on the CTA pattern — friction level, action type, and whether it matches the funnel stage",
  "angle_insight": "1 sharp sentence on which content angle groups dominate and what that reveals about the brand's positioning strategy",
  "key_takeaway": "the single most actionable strategic insight — if you were briefing a creative team, this is the one thing they must do",
  "recommendations": [
    {"title":"Strategic rec 1","desc":"specific, opinionated advice grounded in the pattern — no generic advice"},
    {"title":"Strategic rec 2","desc":"specific, opinionated advice grounded in the pattern — no generic advice"},
    {"title":"Strategic rec 3","desc":"specific, opinionated advice grounded in the pattern — no generic advice"}
  ]
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`API ${res.status}`);}
  const data=await res.json();
  const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  let narrative = {};
  try{const m=text.replace(/```json|```/g,'').match(/\{[\s\S]*\}/);if(m)narrative=JSON.parse(m[0]);}catch{}

  return { hookFreq,styleFreq,moodFreq,ctaFreq,ctaFricFreq,toneFreq,objFreq,groupFreq,angleFreq,tierFreq,faceCount,narrative,total:analyses.length };
}

const DEFAULT_COLOR = '#546e7a';

function getColor(key){ return CHART_COLORS[key] || DEFAULT_COLOR; }

// SVG horizontal bar chart
function svgBarChart(data, title, opts={}){
  const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length) return '';
  const total = sorted.reduce((s,[,v])=>s+v,0);
  const maxV = sorted[0][1];
  const barH = opts.barH || 28;
  const gap   = opts.gap  || 8;
  const labelW = opts.labelW || 160;
  const chartW  = opts.chartW || 220;
  const svgW = labelW + chartW + 60;
  const svgH = sorted.length * (barH + gap) + 4;

  const bars = sorted.map(([label, val], i) => {
    const y = i * (barH + gap);
    const barW = Math.round((val / maxV) * chartW);
    const pct = Math.round((val/total)*100);
    const col = getColor(label);
    const shortLabel = label.length > 22 ? label.slice(0,20)+'…' : label;
    return `
      <text x="${labelW-8}" y="${y+barH*0.67}" text-anchor="end" fill="#7eb3d8" font-size="11" font-family="DM Sans,sans-serif">${shortLabel}</text>
      <rect x="${labelW}" y="${y+2}" width="${barW}" height="${barH-4}" rx="3" fill="${col}" opacity="0.85"/>
      <text x="${labelW+barW+7}" y="${y+barH*0.67}" fill="${col}" font-size="11" font-family="Space Mono,monospace" font-weight="700">${val}×</text>
      <text x="${svgW-4}" y="${y+barH*0.67}" text-anchor="end" fill="#3d6b8a" font-size="10" font-family="Space Mono,monospace">${pct}%</text>`;
  }).join('');

  return `<div class="chart-wrap">
    <div class="chart-title">${title}</div>
    <svg viewBox="0 0 ${svgW} ${svgH}" width="100%" style="overflow:visible">
      ${bars}
    </svg>
  </div>`;
}

// SVG donut chart
function svgDonut(data, title, opts={}){
  const entries = Object.entries(data).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '';
  const total = entries.reduce((s,[,v])=>s+v,0);
  const R=70, r=42, cx=90, cy=90;
  let angle = -Math.PI/2;
  const paths = entries.map(([label,val])=>{
    const slice = (val/total)*Math.PI*2;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    angle+=slice;
    const x2=cx+R*Math.cos(angle), y2=cy+R*Math.sin(angle);
    const large=slice>Math.PI?1:0;
    const xi1=cx+r*Math.cos(angle-slice), yi1=cy+r*Math.sin(angle-slice);
    const xi2=cx+r*Math.cos(angle), yi2=cy+r*Math.sin(angle);
    const col = getColor(label);
    return `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${r},${r} 0 ${large},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${col}" opacity="0.9"/>`;
  }).join('');

  // Legend
  const legend = entries.slice(0,6).map(([label,val])=>{
    const pct=Math.round((val/total)*100);
    const col=getColor(label);
    const short=label.length>20?label.slice(0,18)+'…':label;
    return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <div style="width:10px;height:10px;border-radius:2px;background:${col};flex-shrink:0"></div>
      <span style="font-size:10px;color:#7eb3d8;flex:1">${short}</span>
      <span style="font-size:10px;font-family:'Space Mono',monospace;color:${col}">${pct}%</span>
    </div>`;
  }).join('');

  return `<div class="chart-wrap">
    <div class="chart-title">${title}</div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <svg viewBox="0 0 180 180" width="140" style="flex-shrink:0">${paths}
        <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#e8f4fd" font-size="18" font-weight="700" font-family="Syne,sans-serif">${total}</text>
        <text x="${cx}" y="${cy+20}" text-anchor="middle" fill="#3d6b8a" font-size="9" font-family="Space Mono,monospace">ADS</text>
      </svg>
      <div style="flex:1;min-width:120px">${legend}</div>
    </div>
  </div>`;
}

// SVG pill/badge row
function svgPills(data, title){
  const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length) return '';
  const pills = sorted.map(([label,val])=>{
    const col = getColor(label);
    return `<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:${col}18;border:1px solid ${col}44;font-size:10px;color:${col};font-family:'DM Sans',sans-serif;margin:3px">${label} <span style="font-family:'Space Mono',monospace;font-size:9px">${val}×</span></span>`;
  }).join('');
  return `<div class="chart-wrap">
    <div class="chart-title">${title}</div>
    <div style="display:flex;flex-wrap:wrap;gap:2px">${pills}</div>
  </div>`;
}

function fmtClass(fmt){
  const f=(fmt||'').toLowerCase();
  if(f.includes('document')) return 'fmt-doc';
  if(f.includes('carousel')) return 'fmt-car';

  if(f.includes('thought'))  return 'fmt-tl';
  return 'fmt-img';
}

  document.querySelector('.toast')?.remove();
  const t = document.createElement('div'); t.className='toast';
  t.style.cssText = `border:1px solid ${type==='ok'?'#4caf50':'#f44336'};color:${type==='ok'?'#4caf50':'#f44336'}`;
  t.textContent = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 4500);
}
</script>
</body>
</html>
